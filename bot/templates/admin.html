<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админка | Острый Козырек</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Montserrat', sans-serif; padding: 40px; }
        h1 { font-family: 'Oswald', sans-serif; color: #c4a47c; text-transform: uppercase; border-bottom: 2px solid #c4a47c; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #1a1a1a; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #c4a47c; text-transform: uppercase; }
        tr:hover { background: #222; }
        .back { color: #c4a47c; text-decoration: none; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <a href="/" class="back">← На сайт</a>
    <h1>Список заявок</h1>
    <table>
        <thead>
            <tr>
                <th>Имя</th>
                <th>Телефон</th>
                <th>Дата</th>
            </tr>
        </thead>
        <tbody>
            {% for lead in leads %}
            <tr>
                <td><strong>{{ lead[0] }}</strong></td>
                <td>{{ lead[1] }}</td>
                <td style="color: #666;">{{ lead[2] }}</td>
            </tr>
            {% else %}
            <tr><td colspan="3" style="text-align:center;">Заявок пока нет</td></tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
